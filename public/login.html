<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://cdn.tailwindcss.com https://fonts.googleapis.com https://fonts.gstatic.com https://www.gstatic.com; 
                   script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://www.gstatic.com; 
                   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
                   img-src 'self' https: data:; 
                   connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firestore.googleapis.com;">
    <title>Login | Quick Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Init Dark Mode
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        qt: { red: '#E11D48', dark: '#0F172A', surface: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body
    class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-white min-h-screen flex items-center justify-center font-sans transition-colors duration-300">

    <div
        class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 p-8 rounded-2xl w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black mb-2">QT<span class="text-qt-red">.</span> Login</h1>
            <p class="text-gray-500 dark:text-gray-400">Welcome back, Operator.</p>
        </div>

        <!-- Inline Error Display -->
        <div id="auth-error"
            class="hidden mb-4 p-3 bg-red-950/50 border border-red-500/30 rounded-lg text-red-300 text-sm"></div>
        <!-- Inline Success Display -->
        <div id="auth-success"
            class="hidden mb-4 p-3 bg-green-950/50 border border-green-500/30 rounded-lg text-green-300 text-sm"></div>

        <!-- Social Auth -->
        <div class="space-y-3 mb-6">
            <button onclick="handleSocialLogin('google')"
                class="w-full bg-white dark:bg-gray-800 text-gray-900 dark:text-white font-bold py-3 rounded-lg flex items-center justify-center gap-3 hover:bg-gray-100 dark:hover:bg-gray-700 transition border border-gray-200 dark:border-gray-700">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27c3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10c5.35 0 9.25-3.67 9.25-9.09c0-1.15-.15-1.81-.15-1.81z" />
                </svg>
                Continue with Google
            </button>
        </div>

        <div class="relative mb-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300 dark:border-gray-800"></div>
            </div>
            <div class="relative flex justify-center text-sm"><span
                    class="px-2 bg-white dark:bg-gray-900 text-gray-500">Or continue
                    with email</span></div>
        </div>

        <form id="login-form" class="space-y-5" novalidate>
            <div>
                <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">Email</label>
                <input type="email" id="email" autocomplete="email"
                    class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-4 py-3 text-gray-900 dark:text-white focus:outline-none focus:border-qt-red focus:ring-1 focus:ring-qt-red transition-colors"
                    placeholder="name@example.com" required>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400">Password</label>
                    <button type="button" id="forgot-password-btn" class="text-xs text-qt-red hover:underline">Forgot
                        Password?</button>
                </div>
                <input type="password" id="password" autocomplete="current-password"
                    class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-4 py-3 text-gray-900 dark:text-white focus:outline-none focus:border-qt-red focus:ring-1 focus:ring-qt-red transition-colors"
                    placeholder="••••••••" required>
            </div>

            <button type="submit" id="login-btn"
                class="w-full bg-qt-red hover:bg-red-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-red-900/20 flex items-center justify-center gap-2">
                <span>Initialize Session</span>
                <svg id="login-spinner" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            Don't have credentials? <a href="signup.html" class="text-qt-red hover:underline font-medium">Request
                Access</a>
        </div>

        <div class="mt-4 text-center">
            <a href="index.html" class="text-gray-600 hover:text-gray-400 text-xs text-center">← Return to Global
                Feed</a>
        </div>
    </div>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const errorEl = document.getElementById('auth-error');
        const successEl = document.getElementById('auth-success');

        function showFormError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.remove('hidden');
            successEl.classList.add('hidden');
        }
        function showFormSuccess(msg) {
            successEl.textContent = msg;
            successEl.classList.remove('hidden');
            errorEl.classList.add('hidden');
        }
        function hideMessages() {
            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');
        }

        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const spinner = document.getElementById('login-spinner');
            const btnText = btn.querySelector('span');

            // Client-side validation
            if (!email || !validateEmail(email.trim())) {
                showFormError('Please enter a valid email address.');
                return;
            }
            if (!password || password.length < 6) {
                showFormError('Password must be at least 6 characters.');
                return;
            }

            try {
                btnText.textContent = 'Authenticating...';
                spinner.classList.remove('hidden');
                btn.disabled = true;

                await handleLogin(email, password);
                showFormSuccess('Login successful! Redirecting...');
                setTimeout(() => { window.location.href = 'index.html'; }, 800);
            } catch (err) {
                showFormError(err.message);
                btnText.textContent = 'Initialize Session';
                spinner.classList.add('hidden');
                btn.disabled = false;
            }
        });

        // Forgot Password handler
        document.getElementById('forgot-password-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            hideMessages();

            if (!email || !validateEmail(email)) {
                showFormError('Enter your email address above, then click "Forgot Password?"');
                document.getElementById('email').focus();
                return;
            }

            try {
                await handleForgotPassword(email);
                showFormSuccess(`Password reset email sent to ${email}. Check your inbox.`);
            } catch (err) {
                showFormError(err.message);
            }
        });
    </script>
</body>

</html>
