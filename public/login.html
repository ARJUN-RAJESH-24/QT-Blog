<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Quick Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        qt: { red: '#E11D48', dark: '#0F172A', surface: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body
    class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-white min-h-screen flex items-center justify-center font-sans transition-colors duration-300">

    <div
        class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 p-8 rounded-2xl w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black mb-2">QT<span class="text-qt-red">.</span> Login</h1>
            <p class="text-gray-500 dark:text-gray-400">Welcome back, Operator.</p>
        </div>

        <!-- Social Auth -->
        <div class="space-y-3 mb-6">
            <button onclick="handleSocialLogin('google')"
                class="w-full bg-white text-gray-900 font-bold py-3 rounded-lg flex items-center justify-center gap-3 hover:bg-gray-100 transition">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27c3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10c5.35 0 9.25-3.67 9.25-9.09c0-1.15-.15-1.81-.15-1.81z" />
                </svg>
                Continue with Google
            </button>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="handleSocialLogin('microsoft')"
                    class="bg-gray-800 hover:bg-gray-700 text-white py-2 rounded-lg font-medium text-sm flex items-center justify-center">Microsoft</button>
                <button onclick="handleSocialLogin('facebook')"
                    class="bg-[#1877F2] hover:bg-blue-700 text-white py-2 rounded-lg font-medium text-sm flex items-center justify-center">Facebook</button>
                <button onclick="handleSocialLogin('apple')"
                    class="bg-white text-black hover:bg-gray-200 py-2 rounded-lg font-medium text-sm flex items-center justify-center">Apple</button>
            </div>
        </div>

        <div class="relative mb-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-800"></div>
            </div>
            <div class="relative flex justify-center text-sm"><span class="px-2 bg-gray-900 text-gray-500">Or continue
                    with mail</span></div>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Email Access</label>
                <input type="email" id="email"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-qt-red transition-colors"
                    placeholder="name@example.com" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Passcode</label>
                <input type="password" id="password"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-qt-red transition-colors"
                    placeholder="••••••••" required>
            </div>

            <button type="submit"
                class="w-full bg-qt-red hover:bg-red-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-red-900/20">
                Initialize Session
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            Don't have credentials? <a href="signup.html" class="text-qt-red hover:underline">Request Access</a>
        </div>

        <div class="mt-4 text-center">
            <a href="index.html" class="text-gray-600 hover:text-gray-400 text-xs text-center">Return to Global Feed</a>
        </div>
    </div>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');

            try {
                btn.textContent = 'Authenticating...';
                await handleLogin(email, password);
                window.location.href = 'index.html';
            } catch (err) {
                alert('Access Denied: ' + err.message);
                btn.textContent = 'Initialize Session';
            }
        });
    </script>
</body>

</html>
