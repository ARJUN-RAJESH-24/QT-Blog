<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Quick Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        qt: { red: '#E11D48', dark: '#0F172A', surface: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body
    class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-white min-h-screen flex items-center justify-center font-sans py-12 transition-colors duration-300">

    <div
        class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 p-8 rounded-2xl w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black mb-2">QT<span class="text-qt-red">.</span> Uplink</h1>
            <p class="text-gray-500 dark:text-gray-400">Initialize Subscription Protocol.</p>
        </div>

        <form id="signup-form" class="space-y-6">
            <!-- Access Credentials -->
            <div class="space-y-4">
                <h3 class="text-sm font-bold text-white uppercase tracking-wider border-b border-gray-800 pb-2">1.
                    Credentials</h3>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Email Access</label>
                    <input type="email" id="email"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-qt-red transition-colors"
                        placeholder="name@example.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Establish Passcode</label>
                    <input type="password" id="password"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-qt-red transition-colors"
                        placeholder="••••••••" required>
                </div>
            </div>

            <!-- Preferences -->
            <div class="space-y-4">
                <h3 class="text-sm font-bold text-white uppercase tracking-wider border-b border-gray-800 pb-2">2.
                    Briefing Preferences</h3>
                <p class="text-xs text-gray-500">Select streams to receive priority dispatch notifications.</p>

                <div class="grid grid-cols-2 gap-3">
                    <label
                        class="flex items-center space-x-3 bg-gray-800 p-3 rounded-lg cursor-pointer hover:bg-gray-700 transition">
                        <input type="checkbox" name="pref" value="hardware"
                            class="form-checkbox h-4 w-4 text-qt-red border-gray-600 rounded bg-gray-700 focus:ring-offset-gray-900 focus:ring-qt-red">
                        <span class="text-sm">Hardware</span>
                    </label>
                    <label
                        class="flex items-center space-x-3 bg-gray-800 p-3 rounded-lg cursor-pointer hover:bg-gray-700 transition">
                        <input type="checkbox" name="pref" value="space"
                            class="form-checkbox h-4 w-4 text-qt-red border-gray-600 rounded bg-gray-700 focus:ring-offset-gray-900 focus:ring-qt-red">
                        <span class="text-sm">Space / NASA</span>
                    </label>
                    <label
                        class="flex items-center space-x-3 bg-gray-800 p-3 rounded-lg cursor-pointer hover:bg-gray-700 transition">
                        <input type="checkbox" name="pref" value="ai"
                            class="form-checkbox h-4 w-4 text-qt-red border-gray-600 rounded bg-gray-700 focus:ring-offset-gray-900 focus:ring-qt-red">
                        <span class="text-sm">AI / Deep</span>
                    </label>
                    <label
                        class="flex items-center space-x-3 bg-gray-800 p-3 rounded-lg cursor-pointer hover:bg-gray-700 transition">
                        <input type="checkbox" name="pref" value="software"
                            class="form-checkbox h-4 w-4 text-qt-red border-gray-600 rounded bg-gray-700 focus:ring-offset-gray-900 focus:ring-qt-red">
                        <span class="text-sm">Software / OS</span>
                    </label>
                </div>
            </div>

            <button type="submit"
                class="w-full bg-qt-red hover:bg-red-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-red-900/20">
                Initialize Account
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            Already authenticated? <a href="login.html" class="text-qt-red hover:underline">Login here</a>
        </div>
    </div>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');

            // Get Checkboxes
            const checkboxes = document.querySelectorAll('input[name="pref"]:checked');
            const preferences = Array.from(checkboxes).map(cb => cb.value);

            try {
                btn.textContent = 'Processing...';
                await handleSignup(email, password, preferences);
                window.location.href = 'index.html';
            } catch (err) {
                alert('Error: ' + err.message);
                btn.textContent = 'Initialize Account';
            }
        });
    </script>
</body>

</html>
