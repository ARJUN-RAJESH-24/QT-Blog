<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article | Quick Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        qt: { red: '#E11D48', dark: '#0F172A', aspect: '#0ea5e9' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
        }

        .dark .glass-nav {
            background: rgba(15, 23, 42, 0.9);
        }
    </style>
</head>

<body
    class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-white min-h-screen flex flex-col transition-colors duration-300"
    id="article-page">

    <!-- Navbar -->
    <nav
        class="glass-nav fixed w-full z-50 border-b border-gray-200 dark:border-gray-800 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex-shrink-0 cursor-pointer" onclick="window.location.href='index.html'">
                    <span class="text-3xl font-extrabold tracking-tighter text-gray-900 dark:text-white">
                        QT<span class="text-qt-red">.</span>
                    </span>
                </div>

                <!-- Desktop Menu -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="index.html"
                            class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium">Home</a>
                        <a href="category.html?c=hardware"
                            class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium">Hardware</a>
                        <a href="category.html?c=software"
                            class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium">Software</a>
                        <a href="category.html?c=ai"
                            class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium">AI</a>
                        <a href="category.html?c=space"
                            class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium">Space</a>
                        <a href="category.html?c=gaming"
                            class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white px-3 py-2 rounded-md text-sm font-medium">Gaming</a>
                    </div>
                </div>

                <!-- Right Side -->
                <div class="flex items-center space-x-4">
                    <!-- Theme Toggle -->
                    <button onclick="toggleTheme()"
                        class="p-2 rounded-lg bg-gray-200 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-300 dark:hover:bg-gray-700 transition">
                        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                        </svg>
                        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor"
                            viewBox="0 0 20 20">
                            <path
                                d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
                                fill-rule="evenodd" clip-rule="evenodd"></path>
                        </svg>
                    </button>
                    <!-- Auth -->
                    <div id="user-profile" class="hidden md:flex items-center space-x-4">
                        <span class="text-gray-600 dark:text-gray-300 text-sm" id="user-email">User</span>
                        <div class="h-8 w-8 rounded-full bg-gradient-to-tr from-qt-red to-blue-500"></div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 w-full grid grid-cols-1 lg:grid-cols-3 gap-12">

        <article class="lg:col-span-2">

            <div class="mb-6">
                <span id="article-category"
                    class="text-qt-aspect text-xs font-bold uppercase tracking-widest mb-2 block">CATEGORY</span>
                <h1 id="article-title" class="text-3xl md:text-5xl font-black leading-tight mb-4">Loading Title...</h1>
                <div class="flex items-center gap-4 text-gray-400 text-sm">
                    <span id="article-author">Author</span>
                    <span>•</span>
                    <span id="article-date">Date</span>
                </div>
            </div>

            <!-- Feature Image -->
            <div class="aspect-video w-full rounded-2xl overflow-hidden mb-8 border border-gray-800 bg-gray-900">
                <img id="article-image" src="" class="w-full h-full object-cover">
            </div>

            <!-- Ad In-Article -->
            <div
                class="w-full h-40 bg-gray-900 rounded-lg flex flex-col items-center justify-center border border-dashed border-gray-700 mb-8 p-4 text-center">
                <span class="text-gray-600 font-mono text-xs mb-2">ADVERTISEMENT</span>
                <p class="text-gray-500 text-xs">Support QT by disabling AdBlock</p>
            </div>

            <div id="article-body" class="prose prose-invert prose-lg max-w-none text-gray-300">
                <p class="text-xl leading-relaxed">Loading content...</p>
            </div>
        </article>

        <!-- Sidebar -->
        <aside class="space-y-8">
            <!-- Sidebar Ad -->
            <div
                class="w-full h-[600px] bg-gray-900 rounded-xl border border-gray-800 flex items-center justify-center sticky top-24">
                <span class="text-gray-600 font-mono text-xs">VERTICAL AD UNIT</span>
            </div>
        </aside>

    </main>

    <!-- Scripts -->
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/news-service.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
